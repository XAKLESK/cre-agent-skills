name: New Skill Request
description: Request a new CRE analysis skill
title: "[New Skill] "
labels: ["new-skill"]
body:
  - type: dropdown
    id: department
    attributes:
      label: Which department?
      options:
        - Due Diligence
        - Underwriting
        - Financing
        - Legal
        - Closing
        - Document Ingestion
        - Other / New Department
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What should this skill do?
      description: Describe the analysis task, what inputs it takes, and what outputs it produces.
      placeholder: "A skill that analyzes commercial lease abstracts and extracts key terms..."
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: When would someone use this?
      description: Describe the real-world situation where this skill is needed.
      placeholder: "During due diligence when reviewing a mixed-use property with commercial tenants..."
    validations:
      required: false
