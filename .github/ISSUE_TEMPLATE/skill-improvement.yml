name: Skill Improvement
description: Suggest an improvement to an existing skill or knowledge base
title: "[Improvement] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: skill
    attributes:
      label: Which skill or knowledge base?
      options:
        - "Due Diligence: Rent Roll Analyst"
        - "Due Diligence: OpEx Analyst"
        - "Due Diligence: Market Study"
        - "Due Diligence: Physical Inspection"
        - "Due Diligence: Environmental Review"
        - "Due Diligence: Legal & Title Review"
        - "Due Diligence: Tenant Credit"
        - "Underwriting: Financial Model Builder"
        - "Underwriting: Scenario Analyst"
        - "Underwriting: IC Memo Writer"
        - "Financing: Lender Outreach"
        - "Financing: Quote Comparator"
        - "Financing: Term Sheet Builder"
        - "Legal: PSA Reviewer"
        - "Legal: Title & Survey Reviewer"
        - "Legal: Estoppel Tracker"
        - "Legal: Loan Doc Reviewer"
        - "Legal: Insurance Coordinator"
        - "Legal: Transfer Doc Preparer"
        - "Closing: Closing Coordinator"
        - "Closing: Funds Flow Manager"
        - "Document Ingestion: Document Classifier"
        - "Document Ingestion: Rent Roll Parser"
        - "Document Ingestion: Financials Parser"
        - "Document Ingestion: Offering Memo Parser"
        - "Knowledge Base: Underwriting Calculations"
        - "Knowledge Base: Risk Scoring Framework"
        - "Knowledge Base: Multifamily Benchmarks"
        - "Knowledge Base: Lender Criteria"
        - "Knowledge Base: Legal Checklist"
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: What should be improved?
      description: Describe the improvement — updated formulas, missing analysis steps, outdated thresholds, etc.
      placeholder: "The tax reassessment modeling in the OpEx Analyst should account for..."
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source or reference
      description: If this is based on industry data or a specific reference, include it here.
      placeholder: "Per NMHC 2025 operating expense survey..."
    validations:
      required: false
